name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: retail
          POSTGRES_USER: retail
          POSTGRES_PASSWORD: retail
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U retail -d retail"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e '.[dev]'
      - name: Format check
        run: black --check .
      - name: Lint
        run: ruff check .
      - name: Unit tests
        run: pytest tests/unit
      - name: Integration tests
        run: pytest tests/integration
      - name: Airflow DAG import check
        run: python -m py_compile dags/ecommerce_sales_pipeline.py
